services:
  unittcms:
    image: unittcms:latest
    build:
      context: .
      args:
        - API_PATH=${API_PATH:-/api}
    ports:
      - '8000:8000'
    environment:
      - PORT=8000
      - SECRET_KEY=your_secret_key_here
      - BCRYPT_ROUNDS=10 # optional: bcrypt cost factor for password hashing (default: 10)
      - IS_DEMO=false # set to true to seed the database
      - API_PATH=${API_PATH:-/api}
    volumes:
      - db-data:/app/backend/database
      - ./backend/public/uploads:/app/backend/public/uploads

volumes:
  db-data:
